<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生活记录 · 日志</title>
<style>
  :root {
    --bg: #faf6f2;
    --card: #ffffff;
    --text: #2d2a24;
    --muted: #999080;
    --accent: #c0816e;
    --accent2: #e8c8b8;
    --border: #ece6df;
    --shadow: 0 2px 12px rgba(0,0,0,.06);
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }
  .container { max-width: 640px; margin: 0 auto; padding: 32px 20px; }

  /* header */
  header { text-align: center; margin-bottom: 40px; }
  header h1 {
    font-size: 28px; font-weight: 600; letter-spacing: 2px;
    color: var(--text);
  }
  header p {
    font-size: 14px; color: var(--muted); margin-top: 4px;
    letter-spacing: 1px;
  }
  header .subtitle { margin-top: 12px; }

  /* form */
  .entry-form {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 28px;
  }
  .entry-form textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-family: inherit;
    line-height: 1.7;
    resize: vertical;
    min-height: 100px;
    outline: none;
    transition: border .2s;
    background: var(--bg);
    color: var(--text);
  }
  .entry-form textarea:focus {
    border-color: var(--accent);
  }
  .entry-form textarea::placeholder {
    color: var(--muted);
    opacity: .6;
  }
  .form-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .mood-select {
    display: flex;
    gap: 6px;
  }
  .mood-select button {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid transparent;
    background: var(--bg);
    font-size: 18px;
    cursor: pointer;
    transition: all .2s;
    line-height: 1;
  }
  .mood-select button:hover {
    transform: scale(1.15);
  }
  .mood-select button.active {
    border-color: var(--accent);
    background: var(--accent2);
    transform: scale(1.1);
  }
  .form-date {
    font-size: 13px;
    color: var(--muted);
    margin-left: auto;
  }
  .submit-btn {
    margin-top: 14px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background .2s, transform .1s;
  }
  .submit-btn:hover { background: #b06f5c; }
  .submit-btn:active { transform: scale(.98); }

  /* timeline */
  .timeline-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .timeline-header h2 {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }
  .timeline-header .count {
    font-size: 13px;
    color: var(--muted);
  }

  .entry {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 22px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    position: relative;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .entry-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .entry-date {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }
  .entry-mood { font-size: 18px; }
  .entry-text {
    font-size: 15px;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .entry-time {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
    opacity: .6;
  }
  .entry-delete {
    position: absolute;
    top: 14px; right: 16px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    opacity: 0;
    transition: opacity .2s;
    padding: 4px 6px;
    border-radius: 6px;
    line-height: 1;
  }
  .entry:hover .entry-delete { opacity: .5; }
  .entry-delete:hover { opacity: 1 !important; background: #fee; color: #c0392b; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; opacity: .7; }

  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .filter-bar button {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    color: var(--muted);
  }
  .filter-bar button:hover { border-color: var(--accent2); }
  .filter-bar button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .clear-btn {
    display: block;
    margin: 20px auto 40px;
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
  }
  .clear-btn:hover {
    border-color: #e74c3c;
    color: #e74c3c;
  }

  footer {
    text-align: center;
    padding: 20px 0 40px;
    font-size: 12px;
    color: var(--muted);
    opacity: .5;
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(45,42,36,.85);
    color: #fff;
    padding: 10px 24px;
    border-radius: 30px;
    font-size: 14px;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    backdrop-filter: blur(4px);
    z-index: 99;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>📖 生活记录</h1>
    <p class="subtitle">每一天都值得被记住</p>
  </header>

  <div class="entry-form">
    <textarea id="contentInput" placeholder="今天发生了什么？写下来吧 …"></textarea>
    <div class="form-row">
      <div class="mood-select" id="moodSelector">
        <button data-mood="😊" title="开心">😊</button>
        <button data-mood="😌" title="平静">😌</button>
        <button data-mood="😐" title="一般">😐</button>
        <button data-mood="😢" title="难过">😢</button>
        <button data-mood="🔥" title="激动">🔥</button>
      </div>
      <span class="form-date" id="todayDate"></span>
    </div>
    <button class="submit-btn" id="submitBtn">✎ 记录今天</button>
  </div>

  <div class="timeline-header">
    <h2>📋 时间线</h2>
    <span class="count" id="entryCount">0 条记录</span>
  </div>

  <div class="filter-bar" id="filterBar">
    <button data-filter="all" class="active">全部</button>
    <button data-filter="😊">😊</button>
    <button data-filter="😌">😌</button>
    <button data-filter="😐">😐</button>
    <button data-filter="😢">😢</button>
    <button data-filter="🔥">🔥</button>
  </div>

  <div id="entriesContainer">
    <div class="empty-state" id="emptyState">
      <div class="icon">🌱</div>
      <p>还没有记录，开始写第一篇吧</p>
    </div>
  </div>

  <button class="clear-btn" id="clearBtn">🗑 清空所有记录</button>

  <footer>记录生活 · 本地存储 · 不联网</footer>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'life_log_entries';
  let entries = [];
  let currentMood = '😊';
  let currentFilter = 'all';

  const contentInput = document.getElementById('contentInput');
  const submitBtn = document.getElementById('submitBtn');
  const entriesContainer = document.getElementById('entriesContainer');
  const emptyState = document.getElementById('emptyState');
  const entryCount = document.getElementById('entryCount');
  const toastEl = document.getElementById('toast');

  // date display
  function formatDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    return `${y}年${m}月${day}日 周${weekdays[d.getDay()]}`;
  }
  document.getElementById('todayDate').textContent = formatDate(new Date());

  // mood selector
  document.querySelectorAll('#moodSelector button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#moodSelector button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMood = btn.dataset.mood;
    });
  });
  document.querySelector('#moodSelector button').classList.add('active');

  // toast
  let toastTimer;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
  }

  // load
  function loadEntries() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      entries = raw ? JSON.parse(raw) : [];
    } catch { entries = []; }
  }

  // save
  function saveEntries() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  // render
  function render() {
    const filtered = currentFilter === 'all'
      ? entries
      : entries.filter(e => e.mood === currentFilter);

    if (!filtered.length) {
      entriesContainer.innerHTML = `
        <div class="empty-state" id="emptyState">
          <div class="icon">${entries.length === 0 ? '🌱' : '🔍'}</div>
          <p>${entries.length === 0 ? '还没有记录，开始写第一篇吧' : '没有匹配的记录'}</p>
        </div>`;
      entryCount.textContent = `${entries.length} 条记录`;
      return;
    }

    let html = '';
    filtered.forEach(e => {
      const time = new Date(e.createdAt);
      const dateStr = formatDate(time);
      const timeStr = String(time.getHours()).padStart(2,'0') + ':' + String(time.getMinutes()).padStart(2,'0');
      html += `
        <div class="entry" data-id="${e.id}">
          <div class="entry-header">
            <span class="entry-mood">${e.mood}</span>
            <span class="entry-date">${dateStr}</span>
          </div>
          <div class="entry-text">${escapeHtml(e.content)}</div>
          <span class="entry-time">${timeStr}</span>
          <button class="entry-delete" onclick="deleteEntry('${e.id}')">✕</button>
        </div>`;
    });
    entriesContainer.innerHTML = html;
    entryCount.textContent = `${entries.length} 条记录`;
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  // add
  function addEntry() {
    const content = contentInput.value.trim();
    if (!content) { showToast('写点什么吧 ✍️'); return; }

    const entry = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      content,
      mood: currentMood,
      createdAt: new Date().toISOString(),
    };
    entries.unshift(entry);
    saveEntries();
    render();
    contentInput.value = '';
    contentInput.focus();
    showToast('已记录 🎉');
  }

  submitBtn.addEventListener('click', addEntry);
  contentInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      addEntry();
    }
  });

  // delete
  window.deleteEntry = function(id) {
    entries = entries.filter(e => e.id !== id);
    saveEntries();
    render();
    showToast('已删除');
  };

  // filter
  document.querySelectorAll('#filterBar button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#filterBar button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  // clear all
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!entries.length) { showToast('还没有记录呢'); return; }
    if (confirm('确定要清空所有记录吗？此操作不可恢复。')) {
      entries = [];
      saveEntries();
      render();
      showToast('已清空');
    }
  });

  // init
  loadEntries();
  render();
</script>
</body>
</html>
